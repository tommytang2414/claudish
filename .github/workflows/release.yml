name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write  # Required for npm OIDC trusted publishing

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: claudish-darwin-arm64
          - os: macos-15-intel
            target: bun-darwin-x64
            artifact: claudish-darwin-x64
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: claudish-linux-x64
          - os: ubuntu-24.04-arm
            target: bun-linux-arm64
            artifact: claudish-linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build CLI
        run: bun run build:cli

      - name: Build binary
        run: |
          # Inject version from tag into fallback (for compiled binaries)
          VERSION="${GITHUB_REF#refs/tags/v}"
          sed -i.bak "s/VERSION = \".*\"/VERSION = \"$VERSION\"/" packages/cli/src/cli.ts
          # Build from root to preserve workspace resolution
          bun build packages/cli/src/index.ts --compile --target=${{ matrix.target }} --outfile ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for generating release notes from commits

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          CURRENT_TAG="v${VERSION}"

          # Find previous tag
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | grep -v "^${CURRENT_TAG}$" | head -1)

          if [ -z "$PREV_TAG" ]; then
            # No previous tag — use all commits
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..${CURRENT_TAG}"
          fi

          echo "Generating notes for range: ${RANGE}"

          # Collect commits by category using conventional commit prefixes
          FEATURES=""
          FIXES=""
          DOCS=""
          OTHER=""

          while IFS= read -r line; do
            # Skip empty lines
            [ -z "$line" ] && continue

            # Extract hash and message
            HASH=$(echo "$line" | cut -d' ' -f1)
            MSG=$(echo "$line" | cut -d' ' -f2-)
            SHORT_HASH="${HASH:0:7}"

            # Categorize by conventional commit prefix
            case "$MSG" in
              feat!:*|feat\!:*)
                FEATURES="${FEATURES}- **BREAKING**: ${MSG#feat!: } (\`${SHORT_HASH}\`)"$'\n'
                ;;
              feat:*)
                FEATURES="${FEATURES}- ${MSG#feat: } (\`${SHORT_HASH}\`)"$'\n'
                ;;
              fix:*)
                FIXES="${FIXES}- ${MSG#fix: } (\`${SHORT_HASH}\`)"$'\n'
                ;;
              docs:*)
                DOCS="${DOCS}- ${MSG#docs: } (\`${SHORT_HASH}\`)"$'\n'
                ;;
              *)
                OTHER="${OTHER}- ${MSG} (\`${SHORT_HASH}\`)"$'\n'
                ;;
            esac
          done <<< "$(git log --oneline --no-merges ${RANGE})"

          # Build release notes body
          BODY=""

          if [ -n "$FEATURES" ]; then
            BODY="${BODY}## 🚀 New Features"$'\n\n'"${FEATURES}"$'\n'
          fi

          if [ -n "$FIXES" ]; then
            BODY="${BODY}## 🐛 Bug Fixes"$'\n\n'"${FIXES}"$'\n'
          fi

          if [ -n "$DOCS" ]; then
            BODY="${BODY}## 📖 Documentation"$'\n\n'"${DOCS}"$'\n'
          fi

          if [ -n "$OTHER" ]; then
            BODY="${BODY}## 🔧 Other Changes"$'\n\n'"${OTHER}"$'\n'
          fi

          # Add install section
          BODY="${BODY}## 📦 Install"$'\n\n'
          BODY="${BODY}"'```bash'$'\n'
          BODY="${BODY}# npm"$'\n'
          BODY="${BODY}npm install -g claudish"$'\n\n'
          BODY="${BODY}# or download binary from assets below"$'\n'
          BODY="${BODY}"'```'$'\n\n'

          # Add compare link
          if [ -n "$PREV_TAG" ]; then
            BODY="${BODY}**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${CURRENT_TAG}"$'\n'
          fi

          # Write to file (avoids shell escaping issues with $GITHUB_OUTPUT)
          echo "$BODY" > release-notes.md
          echo "Generated release notes:"
          cat release-notes.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            cp "$dir/$name" "release/$name"
            chmod +x "release/$name"
          done
          ls -la release/

      - name: Generate manifest and checksums
        run: |
          bun scripts/generate-manifest.ts ${{ steps.version.outputs.version }} release
          cat release/manifest.json
          cat release/checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          body_path: release-notes.md
          files: |
            release/claudish-*
            release/manifest.json
            release/checksums.txt
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    # OIDC trusted publishing - no NPM_TOKEN needed!
    # Configure at: https://www.npmjs.com/package/claudish/access (Trusted Publishers)

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm for OIDC support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install

      - name: Update recommended models from OpenRouter
        run: |
          echo "🔄 Fetching latest model data from OpenRouter..."
          bun scripts/update-models.ts
          echo ""
          echo "📋 Updated recommended-models.json:"
          cat packages/cli/recommended-models.json | head -50

      - name: Build packages
        run: bun run build:cli

      - name: Prepare for npm publish
        run: |
          cd packages/cli
          # Fix files array for npm publish
          node -e "
            const pkg = require('./package.json');
            delete pkg.dependencies['@claudish/core'];
            // Use local files, not relative paths to root
            pkg.files = ['dist/', 'AI_AGENT_GUIDE.md', 'recommended-models.json', 'skills/'];
            require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2));
          "
          echo 'Modified package.json:'
          cat package.json

      - name: Publish to npm
        run: cd packages/cli && npm publish --access public --provenance

  deploy-landing-page:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: cd landingpage && bun install --frozen-lockfile

      - name: Build landing page
        run: cd landingpage && bun run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: claudish-6da10
          entryPoint: landingpage

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_HOMEBREW == 'true' }}

    steps:
      - name: Get release info
        id: release
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Wait for release assets
          sleep 10

          # Get checksums
          curl -sL "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/checksums.txt" -o checksums.txt

          ARM64_SHA=$(grep "darwin-arm64" checksums.txt | awk '{print $1}')
          X64_SHA=$(grep "darwin-x64" checksums.txt | awk '{print $1}')

          echo "arm64_sha=$ARM64_SHA" >> $GITHUB_OUTPUT
          echo "x64_sha=$X64_SHA" >> $GITHUB_OUTPUT

      - name: Update Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: MadAppGang/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula
        run: |
          mkdir -p tap/Formula
          cat > tap/Formula/claudish.rb << EOF
          class Claudish < Formula
            desc "Multi-model AI CLI - run Claude Code with any model"
            homepage "https://github.com/MadAppGang/claudish"
            version "${{ steps.release.outputs.version }}"
            license "MIT"

            on_arm do
              url "https://github.com/MadAppGang/claudish/releases/download/v${{ steps.release.outputs.version }}/claudish-darwin-arm64"
              sha256 "${{ steps.release.outputs.arm64_sha }}"
            end

            on_intel do
              url "https://github.com/MadAppGang/claudish/releases/download/v${{ steps.release.outputs.version }}/claudish-darwin-x64"
              sha256 "${{ steps.release.outputs.x64_sha }}"
            end

            def install
              binary = "claudish-darwin-#{Hardware::CPU.arch == :arm64 ? "arm64" : "x64"}"
              bin.install binary => "claudish"
            end

            test do
              assert_match "claudish", shell_output("#{bin}/claudish --version")
            end
          end
          EOF

      - name: Push to tap
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/claudish.rb
          git commit -m "Update claudish to v${{ steps.release.outputs.version }}"
          git push
